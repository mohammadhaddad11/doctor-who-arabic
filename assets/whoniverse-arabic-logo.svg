<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Whoniverse Arabic fan-made logo">
  <defs>
    <radialGradient id="space" cx="50%" cy="38%" r="78%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="40%" stop-color="#172554"/>
      <stop offset="100%" stop-color="#050b1f"/>
    </radialGradient>
    <radialGradient id="vortexCore" cx="50%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.58"/>
      <stop offset="55%" stop-color="#2563eb" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tardisBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
